name: deploy-llms.yml

# Publishes llms.txt to the GitHub Pages site.
#   main           -> site root        (https://telicent-oss.github.io/telicent-ds/llms.txt)
#   other branches -> per-branch preview (https://telicent-oss.github.io/telicent-ds/<branch>/llms.txt)
# keep_files:true lets llms.txt coexist with Storybook (which owns the same
# paths) without either deploy wiping the other. llms has no build step, so it
# deploys well before the matching Storybook job and the pushes do not overlap.

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - docs/COMPONENTS.md
      - scripts/build-llms.mjs
      - .github/workflows/deploy-llms.yml

permissions:
  contents: write

jobs:
  deploy-llms:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19

      # build-llms.mjs is zero-dependency (node: builtins only), so no install step.
      - name: Generate llms.txt
        run: node scripts/build-llms.mjs

      - name: Deploy llms.txt to Pages root
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./llms
          destination_dir: ./
          keep_files: true

      - name: Deploy llms.txt to per-branch preview
        if: github.ref != 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./llms
          destination_dir: ${{ github.ref_name }}
          keep_files: true
